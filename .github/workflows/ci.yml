name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install linters
        run: |
          python3 -m pip install --quiet yamllint ansible-lint

      - name: yamllint
        run: yamllint -d relaxed .

      - name: ansible-lint
        run: ansible-lint infra/ansible/site.yml
        # Grows real teeth once infra/ansible/ has roles beyond the M1
        # base-hardening stub; not fatal yet while the repo is this
        # young, but any lint issue is worth seeing in the PR either way.
        continue-on-error: true

      # M2+: terraform fmt -check / validate once infra/terraform/ has
      # real content; M5: container image build + scan once apps/ has
      # real Dockerfiles.
