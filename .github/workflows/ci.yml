name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install linters
        run: |
          python3 -m pip install --quiet yamllint ansible-lint

      - name: yamllint
        run: yamllint -d relaxed .

      - name: ansible-lint
        run: ansible-lint infra/ansible/site.yml

      # The dev environment used to author this can't reach the
      # Terraform registry (egress-scoped proxy), so full validate runs
      # here, where the runner's network is open — fmt and HCL syntax
      # are checked locally before push, provider-schema validation is
      # CI's job.
      # ubuntu-latest stopped shipping terraform preinstalled — learned
      # from this workflow's first red run, not from the docs.
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform fmt + validate
        working-directory: infra/terraform
        run: |
          terraform fmt -check -diff
          terraform init -backend=false -input=false
          terraform validate

      # M5: container image build + scan once apps/ has real Dockerfiles.
