name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install linters
        run: |
          python3 -m pip install --quiet yamllint ansible-lint

      - name: yamllint
        run: yamllint -d relaxed .

      - name: Install ansible collections the playbook depends on
        run: ansible-galaxy collection install -r infra/ansible/requirements.yml

      - name: ansible-lint
        run: ansible-lint infra/ansible/site.yml

      # Static-only on purpose: the pull loop's real execution test is
      # the first enrolled machine (see docs/runbooks/enroll-a-machine.md
      # — journalctl on the first reconcile pass). A container-based
      # execution test here would exercise a different init/apt stack
      # than the real VMs and mostly test the container.

      # The dev environment used to author this can't reach the
      # Terraform registry (egress-scoped proxy), so full validate runs
      # here, where the runner's network is open — fmt and HCL syntax
      # are checked locally before push, provider-schema validation is
      # CI's job.
      # ubuntu-latest stopped shipping terraform preinstalled — learned
      # from this workflow's first red run, not from the docs.
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform fmt + validate (proxmox)
        working-directory: infra/terraform
        run: |
          terraform fmt -check -diff
          terraform init -backend=false -input=false
          terraform validate

      - name: terraform fmt + validate (gcp)
        working-directory: infra/terraform-gcp
        run: |
          terraform fmt -check -diff
          terraform init -backend=false -input=false
          terraform validate

      # Real build + real run + real HTTP requests against apps/
      # ledger-service, not just lint. The dev environment used to
      # author this can't reach Docker Hub's CDN (egress-scoped
      # proxy rejects CloudFront's presigned URLs), so this is the
      # first place the actual image build gets proven, same reasoning
      # as the Terraform step above.
      - name: ledger-service — build, run, smoke test, load generator
        working-directory: apps/ledger-service
        run: |
          docker compose up --build -d
          BASE_URL=http://127.0.0.1:8000 ./smoke-e2e.sh
          pip install --quiet httpx
          python3 load-generator.py --base-url http://127.0.0.1:8000 \
            --accounts 5 --start-rps 5 --max-rps 15 --step-rps 5 --step-seconds 3
          docker compose logs
          docker compose down -v

      # docs/runbooks/ledger-backup-restore.md's actual mechanism,
      # through the same docker-compose wrapper the runbook documents
      # (verified directly against Postgres, not through Docker, in the
      # authoring environment — see STATUS.md for why).
      - name: ledger-service — backup/restore round-trip
        working-directory: apps/ledger-service
        run: |
          docker compose up -d
          waited=0
          until curl -s -o /dev/null http://127.0.0.1:8000/health; do
            sleep 1
            waited=$((waited + 1))
            if [ "$waited" -gt 60 ]; then echo "service never came up"; exit 1; fi
          done

          before=$(curl -s -X POST http://127.0.0.1:8000/accounts \
            -H 'Content-Type: application/json' -d '{"owner_name":"BackupTest"}')
          account_id=$(echo "$before" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -s -X POST "http://127.0.0.1:8000/accounts/$account_id/deposit" \
            -H 'Content-Type: application/json' -d '{"amount_cents":424242}' >/dev/null

          ./backup.sh ./ci-backups
          dump_file=$(ls ./ci-backups/*.sql)

          docker compose exec -T db psql -U ledger -d ledger \
            -c "DROP TABLE accounts CASCADE; DROP TABLE transactions CASCADE;"

          ./restore.sh "$dump_file"

          restored_balance=$(curl -s "http://127.0.0.1:8000/accounts/$account_id" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['balance_cents'])")
          if [ "$restored_balance" != "424242" ]; then
            echo "FAIL: expected 424242 after restore, got $restored_balance"
            exit 1
          fi
          echo "ok: balance survived a simulated node death + restore"
          docker compose down -v

      # M5: container image scanning once there's more than one image.
