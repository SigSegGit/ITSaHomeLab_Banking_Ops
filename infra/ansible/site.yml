---
# Entrypoint every machine runs against itself (see ARCHITECTURE.md —
# ansible-pull, --connection=local, --limit "%H"; a host must be a
# literal key in inventory/hosts.yml or this matches nothing). Add a
# play per group as groups gain real roles in later milestones.

- name: Baseline every enrolled machine gets, regardless of role
  hosts: all
  become: true
  roles:
    - base-hardening

- name: Stable NAT-traversing addressing for the Patroni cluster
    (Tailscale) — must run before patroni-postgres/patroni-raft-witness,
    which derive every node's address from it
  hosts: patroni_cluster
  become: true
  roles:
    - tailscale

- name: The Patroni-managed PostgreSQL HA cluster (DBRE demo core) —
    real Postgres nodes
  hosts: patroni_db_nodes
  become: true
  roles:
    - patroni-postgres

- name: The Patroni-managed PostgreSQL HA cluster — Postgres-less raft
    witness (3rd quorum vote, see group_vars/patroni_db_nodes/vars.yml)
  hosts: patroni_witness
  become: true
  roles:
    - patroni-raft-witness

# Deliberately runs right after the Patroni cluster plays, still ahead of
# metrics/monitoring: a host that fails a task in one play is excluded from
# every later play in the same ansible-playbook run, so the actual demo
# deliverable (ledger-service, which connects to the Patroni cluster) must
# not sit behind node-exporter/monitoring-stack, which are nice-to-have and
# have already been seen to fail from unrelated host-local package corruption
# which are nice-to-have and have already been seen to fail from unrelated
# host-local package corruption (found running this for real on
# ITSaRevolution: a corrupted dpkg list file for an unrelated package
# blocked node-exporter's install, which then silently skipped the
# banking-app play for that host on every cycle until this reorder).
- name: The banking workload (M3) — apps/ledger-service via docker
    compose, on inventory's `banking_app_nodes` group
  hosts: banking_app_nodes
  become: true
  roles:
    - banking-app

- name: PostgreSQL-specific metrics (replication lag, leader/replica
    role) — the mission's "real performance monitoring" point, not
    covered by generic node-exporter CPU/mem/disk
  hosts: patroni_db_nodes
  become: true
  roles:
    - postgres-exporter

- name: Metrics agent every machine exports, so heterogeneous hardware
    is visible in one place (M4)
  hosts: all
  become: true
  roles:
    - node-exporter

- name: The always-on monitoring stack (Prometheus + Grafana) — lives
    on whichever host is designated in inventory/hosts.yml's
    `monitoring_host` group, deliberately not tied to hardware type
  hosts: monitoring_host
  become: true
  roles:
    - monitoring-stack

