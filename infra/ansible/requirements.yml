---
# Collections site.yml depends on beyond ansible-core builtins.
# Installed by bootstrap/enroll.sh at enrollment time and refreshed by
# the reconcile service before each run, so a collection added here
# reaches every machine through the same pull loop as everything else.
collections:
  - name: community.general
    version: ">=8.0.0"
  - name: ansible.posix
    version: ">=1.5.0"
  - name: community.docker
    version: ">=3.10.0"
