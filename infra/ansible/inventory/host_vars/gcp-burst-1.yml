---
# GCP e2-micro burst node (infra/terraform-gcp) — stands in for
# ITSaRevolution in banking_app_nodes while the Pi's SD card is
# suspect (see STATUS.md). Headless cloud VM: no console keyboard
# layout to set, unlike the physical machines.

# Same key as ITSaRevolution.yml / smallrevolt.yml — the Terraform
# module also grants this key at instance-creation time via the
# `ssh-keys` metadata field, so this is belt-and-suspenders (also lets
# key rotation happen the same way as every other host: a commit here,
# not a manual step on the box).
base_hardening_authorized_keys:
  - "ssh-rsa  sigseg@SIGSEG-DELL"

# This node's own public IP is the reachability story (no SSH tunnel
# needed, unlike ITSaRevolution/smallrevolt) — safe to open the
# firewall as soon as key login is verified, since there's no risk of
# losing the only access path the way there would be on a
# single-network-path home machine.
base_hardening_allowed_tcp_ports:
  - 22
  - 8000  # ledger-service
  - 9100  # node-exporter
