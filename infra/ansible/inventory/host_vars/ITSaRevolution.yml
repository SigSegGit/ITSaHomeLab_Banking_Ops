---
# First real machine in the lab: Raspberry Pi 4B, Raspberry Pi OS Lite
# 64-bit (Trixie), enrolled via bootstrap/enroll.sh. Left in `ungrouped`
# (see hosts.yml) until its role is decided — per ARCHITECTURE.md,
# assigning a job is a separate, deliberate commit from enrollment.

base_hardening_timezone: Europe/Paris
base_hardening_console_keyboard_layout: fr

# Public key only — see docs/runbooks/enroll-a-machine.md. Ansible
# manages this file so that adding/rotating a key later is a commit,
# not an SSH session on the box.
base_hardening_authorized_keys:
  - "ssh-rsa  sigseg@SIGSEG-DELL"

# node-exporter (9100, scraped by smallrevolt) needs to stay reachable
# from the LAN once the firewall is enabled — added ahead of time so
# flipping base_hardening_firewall on later doesn't silently blackhole
# monitoring. Firewall itself stays off until enabled. No 8000 here:
# this host is out of banking_app_nodes for now (see hosts.yml).
base_hardening_allowed_tcp_ports:
  - 22
  - 9100  # node-exporter
