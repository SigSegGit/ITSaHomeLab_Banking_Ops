---
# VM on the owner's Windows laptop (VMware Workstation, Debian 13
# trixie) — only reachable when the laptop is home/on. Unlike
# ITSaRevolution/smallrevolt, this host had no key deployed via
# base-hardening until 2026-07-13 (see STATUS.md): enrolled by hand
# over a one-time password SSH session, used only to drop this same
# lab key, never reused after. Real username confirmed live: `morepower`.

base_hardening_timezone: Europe/Paris
base_hardening_console_keyboard_layout: fr

# Same key as ITSaRevolution.yml / smallrevolt.yml — same owner, same
# machine class. Public key only — see docs/runbooks/enroll-a-machine.md.
base_hardening_authorized_keys:
  - "ssh-rsa  sigseg@SIGSEG-DELL"

# node-exporter (9100) and ledger-service (8000) need to stay reachable
# from the LAN once the firewall is enabled — added ahead of time so
# flipping base_hardening_firewall on later doesn't silently blackhole
# monitoring or the app. Firewall itself stays off until enabled.
base_hardening_allowed_tcp_ports:
  - 22
  - 8000  # ledger-service
  - 9100  # node-exporter
  - 9187  # postgres_exporter (this host is a patroni_db_nodes member)
