---
# The always-on VM on the Freebox router — internet-facing via SSH
# port-forward (22102 -> 22) for the whole weekend, same as
# ITSaRevolution. Deploying a key here so it stops being the one
# machine still on password auth; base_hardening_ssh_lockdown stays
# off until key-based login is verified live (see CLAUDE.md).

base_hardening_timezone: Europe/Paris
base_hardening_console_keyboard_layout: fr

# Same key as ITSaRevolution.yml — same owner, same machine class.
# Public key only — see docs/runbooks/enroll-a-machine.md.
base_hardening_authorized_keys:
  - "ssh-rsa  sigseg@SIGSEG-DELL"

# Grafana/Prometheus (M4) and this host's own node-exporter need to
# stay reachable from the LAN once the firewall is enabled — added
# ahead of time so flipping base_hardening_firewall on later doesn't
# silently blackhole monitoring. Firewall itself stays off until
# that's actually turned on.
base_hardening_allowed_tcp_ports:
  - 22
  - 3000  # Grafana
  - 9090  # Prometheus
  - 9100  # node-exporter (this host's own)
  - 9187  # postgres_exporter (this host is a patroni_db_nodes member)
