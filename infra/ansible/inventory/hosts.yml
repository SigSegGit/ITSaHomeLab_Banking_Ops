all:
  hosts:
    # Le Raspberry Pi
    ITSaRevolution:
      ansible_connection: local
      ansible_host: localhost

    # La VM Freebox
    smallrevolt:
      ansible_connection: local
      ansible_host: localhost

    # La future VM VMware Workstation (Debian/Ubuntu)
    MorePower:
      ansible_connection: local
      ansible_host: localhost

    # GCP e2-micro burst node (infra/terraform-gcp) — built and ready,
    # deliberately NOT applied: the owner doesn't want a real cloud
    # spend or a GCP account setup for this interview prep (2026-07-13).
    # The M2 "elastic ramp-up/down via IaC" demo point is simulated
    # instead of live for the same reason — see STATUS.md. Left defined
    # here, out of every active group below, so the module stays usable
    # later without re-deriving inventory wiring from scratch.
    gcp-burst-1:
      ansible_connection: local
      ansible_host: localhost

  children:
    # Tu peux déjà préparer des groupes si tu veux appliquer des rôles spécifiques plus tard
    rpi_nodes:
      hosts:
        ITSaRevolution:
    freebox_nodes:
      hosts:
        smallrevolt:
    workstation_nodes:
      hosts:
        MorePower:
    cloud_nodes:
      hosts:
        gcp-burst-1:

    # Always-on monitoring stack (Prometheus + Grafana) — the Freebox
    # VM, since it stays up independent of anyone's laptop being on.
    # Not tied to freebox_nodes on purpose: what a machine's hardware
    # *is* and what workload it *runs* are separate axes.
    monitoring_host:
      hosts:
        smallrevolt:

    # The ledger-service workload (M3). ITSaRevolution *and* MorePower —
    # running the same workload on the weakest and strongest machines is
    # what makes a load test actually show a bottleneck. ITSaRevolution
    # was pulled out 2026-07-11 over confirmed ext4 block-bitmap
    # corruption that a full fsck couldn't repair; Nicolas confirmed
    # 2026-07-12 all 3 real machines are alive and put it back in for
    # the demo (see STATUS.md's correction entry). The earlier
    # corruption finding was real, not a misread — if this host starts
    # throwing filesystem errors again mid-demo-prep, don't assume it's
    # an app bug before checking `dmesg`.
    banking_app_nodes:
      hosts:
        MorePower:
        ITSaRevolution:

    # The Patroni-managed PostgreSQL HA cluster — the actual point of
    # this repo now (see CLAUDE.md). Reworked 2026-07-13: MorePower and
    # smallrevolt run Patroni + Postgres (itsarevolution unreachable —
    # see STATUS.md). Swap smallrevolt back for itsarevolution here the
    # day the Pi is confirmed healthy again — see git history for the
    # earlier shape.
    patroni_db_nodes:
      hosts:
        MorePower:
        smallrevolt:
    # Deliberately empty as of 2026-07-13: no 3rd raft voter at all for
    # this demo (a colocated-on-laptop witness was tried and abandoned
    # as a distraction — see STATUS.md). 2 raft members means automatic
    # failover on a hard node loss isn't quorum-safe, but a *planned*
    # `patronictl switchover` is — nothing goes down mid-operation, so
    # both members stay reachable throughout. The demo shows that live
    # and explains the quorum math as the reason production would want
    # a 3rd voter, which is a real DBRE answer, not a workaround.
    patroni_witness:
      hosts: {}
    # Parent group so group_vars/patroni_cluster/* (Tailscale config)
    # applies to both children without duplicating it in each.
    patroni_cluster:
      children:
        patroni_db_nodes:
        patroni_witness:
