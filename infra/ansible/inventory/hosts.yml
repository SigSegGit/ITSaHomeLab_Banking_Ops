all:
  hosts:
    # Le Raspberry Pi
    ITSaRevolution:
      ansible_connection: local
      ansible_host: localhost

    # La VM Freebox
    smallrevolt:
      ansible_connection: local
      ansible_host: localhost

    # La future VM VMware Workstation (Debian/Ubuntu)
    MorePower:
      ansible_connection: local
      ansible_host: localhost

  children:
    # Tu peux déjà préparer des groupes si tu veux appliquer des rôles spécifiques plus tard
    rpi_nodes:
      hosts:
        ITSaRevolution:
    freebox_nodes:
      hosts:
        smallrevolt:
    workstation_nodes:
      hosts:
        MorePower:

    # Always-on monitoring stack (Prometheus + Grafana) — the Freebox
    # VM, since it stays up independent of anyone's laptop being on.
    # Not tied to freebox_nodes on purpose: what a machine's hardware
    # *is* and what workload it *runs* are separate axes.
    monitoring_host:
      hosts:
        smallrevolt:

    # The ledger-service workload (M3) — deliberately the Pi *and*
    # MorePower, not the Freebox VM: running the same workload on the
    # weakest and strongest machines is what makes a load test actually
    # show a bottleneck, and keeping monitoring on its own dedicated
    # host means the comparison isn't confounded by monitoring's own
    # resource usage.
    banking_app_nodes:
      hosts:
        ITSaRevolution:
        MorePower:
