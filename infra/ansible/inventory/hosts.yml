all:
  hosts:
    # Le Raspberry Pi
    ITSaRevolution:
      ansible_connection: local
      ansible_host: localhost

    # La VM Freebox
    smallrevolt:
      ansible_connection: local
      ansible_host: localhost

    # La future VM VMware Workstation (Debian/Ubuntu)
    MorePower:
      ansible_connection: local
      ansible_host: localhost

    # GCP e2-micro burst node (infra/terraform-gcp) — same self-reconcile
    # pattern as every other host: enroll.sh runs on the machine itself
    # via its own first-boot startup-script, so this is still a local
    # connection from the machine's own point of view, not a remote one.
    gcp-burst-1:
      ansible_connection: local
      ansible_host: localhost

  children:
    # Tu peux déjà préparer des groupes si tu veux appliquer des rôles spécifiques plus tard
    rpi_nodes:
      hosts:
        ITSaRevolution:
    freebox_nodes:
      hosts:
        smallrevolt:
    workstation_nodes:
      hosts:
        MorePower:
    cloud_nodes:
      hosts:
        gcp-burst-1:

    # Always-on monitoring stack (Prometheus + Grafana) — the Freebox
    # VM, since it stays up independent of anyone's laptop being on.
    # Not tied to freebox_nodes on purpose: what a machine's hardware
    # *is* and what workload it *runs* are separate axes.
    monitoring_host:
      hosts:
        smallrevolt:

    # The ledger-service workload (M3). Originally ITSaRevolution *and*
    # MorePower — running the same workload on the weakest and
    # strongest machines is what makes a load test actually show a
    # bottleneck. ITSaRevolution pulled out for now: its SD card has
    # confirmed ext4 block-bitmap corruption in 4 groups that a full
    # fsck could not repair (found for real, 2026-07-11 — see
    # STATUS.md), which is the signature of failing physical media, not
    # a software-fixable filesystem issue. Forcing a ~58MB/23-package
    # Docker install onto it every 5 minutes via the pull-model retry
    # loop, unattended, for a whole weekend risks making the corruption
    # worse or bricking the boot with nobody able to intervene. Put it
    # back once someone can look at the card hands-on (health check or
    # replacement).
    banking_app_nodes:
      hosts:
        MorePower:
        gcp-burst-1:
