---
# Applied to patroni_db_nodes (both leader and replica) so Grafana can
# show replication lag and leader/replica role per node — the mission's
# "real performance monitoring" point (see CLAUDE.md) and the explicit
# "monitoring and observability experience with PostgreSQL" job
# requirement. Uses the least-privilege `monitoring` role
# (patroni-postgres role, GRANT pg_monitor) rather than the superuser
# credential.

- name: Install prometheus-postgres-exporter
  ansible.builtin.package:
    name: prometheus-postgres-exporter
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == "Debian"

- name: Configure postgres_exporter's connection string
  ansible.builtin.copy:
    dest: /etc/default/prometheus-postgres-exporter
    content: |
      DATA_SOURCE_NAME=postgresql://monitoring:{{ patroni_monitoring_password }}@localhost:{{ patroni_pg_port }}/postgres?sslmode=disable
      PG_EXPORTER_WEB_LISTEN_ADDRESS=:{{ postgres_exporter_port }}
    owner: root
    group: root
    mode: "0600" # contains a password
  notify: Restart postgres-exporter

- name: Ensure prometheus-postgres-exporter is enabled and running
  ansible.builtin.systemd:
    name: prometheus-postgres-exporter
    state: started
    enabled: true
    daemon_reload: true
