---
# Deploys apps/ledger-service via docker compose on whichever hosts are
# in inventory/hosts.yml's `banking_app_nodes` group. Debian's own
# docker.io/docker-compose-v2 packages are used rather than adding
# Docker's own apt repo (Grafana needed its own repo because Debian
# doesn't package it at all; Docker itself is in Debian's main archive,
# so there's no reason to add a second external repo where one isn't
# needed).

- name: Install Docker and rsync
  ansible.builtin.package:
    name:
      - docker.io
      - rsync
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == "Debian"

# Split from the task above, and tried independently: found running
# this for real on Debian 13 (Trixie) that docker-compose-v2 isn't
# resolvable there (bundling it with docker.io/rsync in one task meant
# that single failure blocked Docker itself from installing at all).
# `update_cache: true` alone might have been the whole story on a
# freshly-imaged machine that never ran `apt update` — kept anyway,
# since a genuinely absent package needs the fallback regardless.
- name: Try installing the compose plugin from the distro's own archive
  ansible.builtin.package:
    name: docker-compose-v2
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == "Debian"
  register: compose_apt_install
  ignore_errors: true

- name: Fall back to Docker's official compose plugin binary
  when: compose_apt_install is failed
  block:
    - name: Ensure a Docker CLI plugins directory exists
      ansible.builtin.file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        mode: "0755"

    - name: Download the docker compose v2 plugin binary
      ansible.builtin.get_url:
        url: >-
          https://github.com/docker/compose/releases/download/v2.32.1/docker-compose-linux-{{
          'aarch64' if ansible_architecture == 'aarch64' else 'x86_64' }}
        dest: /usr/local/lib/docker/cli-plugins/docker-compose
        mode: "0755"

- name: Ensure Docker is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Deploy the ledger-service source tree
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../apps/ledger-service/"
    dest: /opt/ledger-service/
    delete: true
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=.env" # deployed separately below, after this rsync

# Must run after the rsync above: `delete: true` there would remove
# this file on the next cycle otherwise, since it isn't part of the
# source tree (deliberately — it holds a password, so it's templated
# from vault.yml, not committed).
- name: Deploy ledger-service's .env (DATABASE_URL, points at the Patroni cluster)
  ansible.builtin.template:
    src: ledger-service.env.j2
    dest: /opt/ledger-service/.env
    owner: root
    group: root
    mode: "0600"
  # No `when` here on purpose: this whole role only ever runs on
  # `hosts: banking_app_nodes` (see site.yml), so gating on group
  # membership again was redundant — and wrong, since it checked
  # `patroni_db_nodes` instead. That happened to be harmless while
  # every banking_app_nodes host was also a patroni_db_nodes host, but
  # would have silently skipped .env deployment for an app-only node
  # (the normal case banking_app_nodes exists to allow) the moment one
  # showed up. Found 2026-07-13 while debugging why the container
  # couldn't resolve the DB — a red herring investigation until this
  # was spotted; the real cause was the Docker DNS issue below.

- name: Bring up the ledger-service stack
  community.docker.docker_compose_v2:
    project_src: /opt/ledger-service
    state: present
    build: always
    # A standalone `db` container from before the Patroni migration
    # was found still running on MorePower 46 hours after the compose
    # file dropped that service — `docker compose up` doesn't remove
    # containers that are no longer in the file unless told to.
    remove_orphans: true
