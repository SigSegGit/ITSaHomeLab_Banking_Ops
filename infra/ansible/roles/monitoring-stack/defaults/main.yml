---
# Every real machine currently in the lab, used to build Prometheus'
# scrape target list. Kept as an explicit list rather than derived from
# `groups['all']` so adding a machine to the lab doesn't silently start
# scraping it before its node-exporter role has actually run once —
# add it here in the same commit that adds real monitoring for it.
monitoring_scrape_targets:
  - ITSaRevolution
  - smallrevolt
  - MorePower

# Separate from monitoring_scrape_targets on purpose: LAN hosts are
# reachable at "<name>.local:9100" via mDNS, but a cloud node
# (infra/terraform-gcp) has no mDNS name and a static IP that isn't
# known until `terraform apply` runs — so each entry here carries its
# own full address instead of assuming a ".local" suffix. Empty until
# a real node's address is filled in (e.g. after reserving a static IP
# for gcp-burst-1) — same "add it in the commit that adds real
# monitoring for it" discipline as the list above.
monitoring_cloud_scrape_targets: []
# Example once the GCP node's static IP is known:
#   - name: gcp-burst-1
#     address: "203.0.113.10:9100"

# ledger-service's own /metrics (prometheus_fastapi_instrumentator) —
# real app throughput, the mission's 4th "real performance monitoring"
# point. Same explicit-list discipline as monitoring_scrape_targets
# above: only hosts confirmed actually running the app, not derived
# from banking_app_nodes (which isn't in scope here anyway — this
# host, monitoring_host, isn't a banking_app_nodes member itself).
banking_app_scrape_targets:
  - MorePower
