# Grafana provisioning: auto-registers the local Prometheus as a
# datasource on startup, so opening Grafana for the first time doesn't
# need any manual "add datasource" click-through.
apiVersion: 1

datasources:
  - name: Prometheus
    # Explicit, fixed UID — without this, Grafana auto-generates a
    # random one on first provisioning, which doesn't match the literal
    # "Prometheus" UID the dashboard JSON's panels reference, and every
    # panel fails with "Failed to fetch" (found running this for real:
    # the dashboard genuinely wouldn't load on a real deployment).
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: false
