---
- name: Refuse to proceed without a real tailnet domain configured
  ansible.builtin.assert:
    that:
      - tailscale_tailnet_domain | length > 0
    fail_msg: >-
      tailscale_tailnet_domain must be set (group_vars/patroni_cluster/
      vars.yml) before this role can run — every node's
      patroni_advertise_address is derived from it, so a missing value
      here would otherwise silently misconfigure the whole cluster's
      addressing instead of failing loudly right now.
  when: tailscale_enabled

# tailscale_auth_key is intentionally NOT required. 2026-07-13: no
# reusable auth key was ever generated for this tailnet, so
# itsarevolution/smallrevolt/MorePower were enrolled by hand — SSH in,
# `tailscale up` with no --authkey, relay the printed login URL to the
# owner for phone approval. That's a one-time, human-in-the-loop step
# this unattended role was never going to be able to do for a *first*
# join anyway (no one is watching journalctl to click a URL when the
# reconcile timer fires). If a real auth key gets generated later, drop
# it in vault.yml and the task below starts using it automatically —
# until then, the role's job is to keep already-joined nodes joined and
# loudly say so when a node isn't, not to silently no-op.

# Stable, NAT-traversing addressing between nodes that don't share a
# LAN — specifically MorePower, which roams with the owner and gets a
# new IP (usually behind NAT with no port-forward) on every network.
# Patroni's raft quorum and Postgres streaming replication both need
# nodes to reach each other directly; without this, MorePower can only
# ever be an outbound client, never a reachable cluster peer.

- name: Add the Tailscale apt signing key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/debian/{{ ansible_distribution_release }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"
  when: tailscale_enabled and ansible_facts['os_family'] == "Debian"

# Real bug hit live on MorePower (Debian 13/trixie): apt_repository
# shells out to the `gpg` binary and fails outright if it's missing —
# not installed by default on a minimal image, unlike smallrevolt
# (Debian 12/bookworm) where it happened to already be present.
- name: Ensure gnupg is installed (apt_repository needs the gpg binary)
  ansible.builtin.package:
    name: gnupg
    state: present
  when: tailscale_enabled and ansible_facts['os_family'] == "Debian"

- name: Add the Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg]
      https://pkgs.tailscale.com/stable/debian {{ ansible_distribution_release }} main
    filename: tailscale
    state: present
  when: tailscale_enabled and ansible_facts['os_family'] == "Debian"

- name: Install tailscale
  ansible.builtin.package:
    name: tailscale
    state: present
    update_cache: true
  when: tailscale_enabled and ansible_facts['os_family'] == "Debian"

- name: Ensure tailscaled is enabled and running
  ansible.builtin.service:
    name: tailscaled
    state: started
    enabled: true
  when: tailscale_enabled

- name: Check current tailscale status
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false
  when: tailscale_enabled

- name: Whether this node is already logged in
  ansible.builtin.set_fact:
    tailscale_already_logged_in: "{{ (tailscale_status.stdout | default('{}') | from_json).get('BackendState', '') == 'Running' }}"
  when: tailscale_enabled

# Idempotent by design: `tailscale up` with the same authkey/hostname
# on an already-joined node is a no-op (confirms settings rather than
# re-registering), so this is safe to run every reconcile cycle rather
# than only once at enrollment. Only takes this path when a real auth
# key exists — see the note above the assert task.
- name: Join the tailnet (auth key path)
  ansible.builtin.command: >-
    tailscale up --authkey={{ tailscale_auth_key }}
    --hostname={{ inventory_hostname | lower }}
    --accept-dns=true --ssh=false
  when: tailscale_enabled and tailscale_auth_key | length > 0
  changed_when: "'up_result' not in (tailscale_status.stdout | default(''))"
  no_log: true # the auth key would otherwise land in the reconcile log

- name: Fail loudly if this node needs a human to run `tailscale up` once
  ansible.builtin.fail:
    msg: >-
      No tailscale_auth_key is configured and this node isn't logged in
      yet ({{ inventory_hostname }}). Unattended reconcile can't finish
      a first login by itself — a human has to run
      `tailscale up --hostname={{ inventory_hostname | lower }}
      --accept-dns=true --ssh=false` on this host directly, watch for
      the printed login URL, and approve it. Once logged in, this role
      goes back to being a no-op reconcile step.
  when: tailscale_enabled and tailscale_auth_key | length == 0 and not tailscale_already_logged_in

# Covers nodes that first joined manually before this flag flipped to
# true (real bug hit 2026-07-13: smallrevolt/MorePower were enrolled
# with --accept-dns=false, which does not push tailscale's MagicDNS
# resolver into the node's own resolv.conf — patroni_advertise_address
# and patroni_raft_members both depend entirely on `<host>.<tailnet>`
# actually resolving, so patronictl and Patroni's own raft/replication
# connections failed outright with "failed to resolve host"). `tailscale
# set` only touches runtime flags on an already-authenticated node, no
# re-login needed, and is a safe no-op once the setting is already correct.
- name: Ensure MagicDNS is accepted (patroni_advertise_address needs it to resolve)
  ansible.builtin.command: tailscale set --accept-dns=true
  when: tailscale_enabled and tailscale_already_logged_in
  changed_when: false

- name: Confirm this node's tailnet hostname resolves the way patroni_advertise_address expects
  ansible.builtin.debug:
    msg: >-
      This node should be reachable at
      {{ inventory_hostname | lower }}.{{ tailscale_tailnet_domain }} —
      confirm with `tailscale status` if peers can't reach it.
  when: tailscale_enabled
