---
# Lockout-shaped changes (SSH auth policy, firewall) default OFF and are
# enabled per group/host in the inventory. Rationale: this role runs
# unattended on every enrolled machine via the pull loop — a bad default
# here doesn't fail a CI job, it locks the operator out of a real box.
# Flipping a toggle is a one-line inventory commit, which is exactly the
# kind of explicit, reviewable step ARCHITECTURE.md wants for anything
# irreversible-shaped.

# Write an sshd drop-in: key-only auth, no root login, no X11.
# Only enable for machines you can already reach with an SSH key.
base_hardening_ssh_lockdown: false

# Install UFW and default-deny inbound (SSH allowed). Outbound stays
# open at this layer — per-segment egress policy is the router's job
# (docs/network.md), not per-host duplication.
base_hardening_firewall: false

# Ports left open when the firewall is enabled.
base_hardening_allowed_tcp_ports:
  - 22

# Public keys authorized for base_hardening_authorized_keys_user.
# Empty by default (no-op) — set per-host so key rotation is a git
# commit, not an SSH session on the box. Private keys never belong here
# or anywhere else in this repo.
base_hardening_authorized_keys: []
base_hardening_authorized_keys_user: "{{ ansible_user_id }}"

# Unset by default (no-op) — set per-host/group when it matters.
base_hardening_timezone: ""
base_hardening_console_keyboard_layout: ""
