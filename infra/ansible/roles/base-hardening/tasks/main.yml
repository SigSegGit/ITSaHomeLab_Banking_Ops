---
# The baseline every enrolled machine gets before anyone decides what
# it's actually for (site.yml's `hosts: all` play). Unattended-updates
# are unconditional; anything that could lock the operator out (SSH
# auth policy, firewall) is toggle-gated — see defaults/main.yml.

- name: Install unattended-upgrades
  ansible.builtin.package:
    name: unattended-upgrades
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: Enable periodic unattended security updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"
  when: ansible_facts['os_family'] == "Debian"

- name: Apply SSH lockdown drop-in (key-only, no root login)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-homelab-hardening.conf
    content: |
      # Managed by base-hardening (this repo). Local edits will be
      # overwritten on the next reconcile pass.
      PasswordAuthentication no
      PermitRootLogin prohibit-password
      X11Forwarding no
    owner: root
    group: root
    mode: "0644"
    validate: sshd -t -f %s
  when: base_hardening_ssh_lockdown
  notify: Reload sshd

- name: Install UFW
  ansible.builtin.package:
    name: ufw
    state: present
  when: base_hardening_firewall

- name: Allow inbound TCP ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ base_hardening_allowed_tcp_ports }}"
  when: base_hardening_firewall

- name: Enable UFW with default-deny inbound
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
  when: base_hardening_firewall

- name: Manage authorized SSH public keys
  ansible.posix.authorized_key:
    user: "{{ base_hardening_authorized_keys_user }}"
    key: "{{ item }}"
    exclusive: false
  loop: "{{ base_hardening_authorized_keys }}"
  when: base_hardening_authorized_keys | length > 0

- name: Set system timezone
  community.general.timezone:
    name: "{{ base_hardening_timezone }}"
  when: base_hardening_timezone | length > 0

- name: Check whether this host has a real console (console-setup package)
  ansible.builtin.stat:
    path: /etc/default/keyboard
  register: base_hardening_keyboard_file
  when: base_hardening_console_keyboard_layout | length > 0

- name: Set console keyboard layout
  ansible.builtin.lineinfile:
    path: /etc/default/keyboard
    regexp: '^XKBLAYOUT='
    line: 'XKBLAYOUT="{{ base_hardening_console_keyboard_layout }}"'
  # Headless VMs (smallrevolt, MorePower) never install console-setup,
  # so /etc/default/keyboard genuinely doesn't exist there — that's not
  # a fixable misconfiguration, it's a real console-less machine, so
  # skip rather than fail the whole reconcile run over a setting that
  # has nowhere to apply. Physical machines with a console (the Pi)
  # keep getting this set normally.
  when:
    - base_hardening_console_keyboard_layout | length > 0
    - base_hardening_keyboard_file.stat.exists
  notify: Apply console keyboard layout

- name: Confirm this host's identity for the reconcile log
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }} reconciled at {{ ansible_date_time.iso8601 }}
      (groups: {{ group_names | join(', ') }})
