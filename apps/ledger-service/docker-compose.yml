services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    volumes:
      - ledger-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 2s
      timeout: 2s
      retries: 15

  ledger:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://ledger:ledger@db:5432/ledger
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  ledger-db-data:
