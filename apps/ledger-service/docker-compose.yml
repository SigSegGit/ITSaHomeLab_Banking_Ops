services:
  ledger:
    build: .
    restart: unless-stopped
    environment:
      # No standalone `db` service — connects to the Patroni-managed
      # HA cluster (infra/ansible/roles/patroni-postgres). DATABASE_URL
      # is provided via .env, deployed by the banking-app Ansible role
      # from a template that lists both Patroni nodes with
      # target_session_attrs=read-write: libpq itself finds whichever
      # node is currently primary, so this doesn't need to change (or
      # for anyone to point it at a new host) across a failover.
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
